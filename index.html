<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title> Counter app</title>
</head>
<body class="bg-stone-600 min-h-screen flex flex-col gap-8 justify-center items-center">
    <div class="bg-stone-400 p-10 rounded-xl shadow-lg text-center w-120 h-70">
        <h1 class="text-4xl font-bold font-mono mb-6 text-center ">Counter App</h1>
        <div class="flex gap-6 font-mono justify-center items-center text-2xl">
            <button id="incbtn" class="border px-4 py-2 bg-green-700 hover:bg-green-400 rounded-xl">INCREASE</button>
            <h4 id="counter">0</h4>
            <button id="decbtn" class="border px-4 py-2 bg-red-600 hover:bg-red-400 rounded-xl">DECREASE</button>
            
        </div>
        <button id="resetbtn" class="text-xl border px-3 bg-yellow-500 hover:bg-yellow-200 rounded-xl mt-6">RESET</button>
    </div>
    
   
    

    <script src="./count.js"></script>
</body>
</html>
